version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: food-stock-postgres
    environment:
      POSTGRES_DB: foodstock
      POSTGRES_USER: foodstock
      POSTGRES_PASSWORD: foodstock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodstock"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: food-stock-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/foodstock
      DATABASE_USERNAME: foodstock
      DATABASE_PASSWORD: foodstock
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
